<!doctype html>
<html lang="en" class="mdui-theme-dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>SIBS V4.0</title>

        <!-- PWA Manifest -->
        <link
            rel="manifest"
            href="{{ url_for('static', filename='manifest.json') }}"
        />

        <!-- iOS PWA Support -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="SIBS V4.0" />
        <link
            rel="apple-touch-icon"
            href="{{ url_for('static', filename='img/favicon.ico') }}"
        />

        <!-- Theme Color -->
        <meta name="theme-color" content="#5aaedb" />

        <script src="{{ url_for('static',filename='lib/socket.io.min.js') }}"></script>
        <link
            rel="stylesheet"
            href="{{ url_for('static',filename='lib/mdui.css') }}"
        />
        <script src="{{ url_for('static',filename='lib/mdui.global.js') }}"></script>
        <link
            rel="stylesheet"
            href="{{ url_for('static',filename='css/styles.css') }}"
        />

        <link
            rel="shortcut icon"
            href="{{ url_for('static', filename='img/favicon.ico') }}"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/material-icons.css') }}"
        />
    </head>

    <body>
        <script>
            mdui.setColorScheme("#5aaedb");
        </script>
        <div class="vertical">
            <mdui-card
                variant="filled"
                class="video-feed-outer"
                id="video-container-id"
            >
                <div class="settings-launcher">
                    <mdui-dropdown placement="bottom-end">
                        <mdui-button-icon
                            slot="trigger"
                            variant="filled-tonal"
                            icon="settings"
                            title="Settings"
                            aria-label="Settings"
                        ></mdui-button-icon>
                        <mdui-card variant="elevated" class="settings-popout">
                            <div class="settings-section">
                                <label for="ledBrightnessSlider">LED Control</label>

                                <div class="horizontal settings-row">
                                    <mdui-switch
                                        id="ledSwitch"
                                        label="LED On/Off"
                                        onchange="ledToggle(this)"
                                    ></mdui-switch>

                                    <mdui-slider
                                        id="ledBrightnessSlider"
                                        value="20"
                                        min="20"
                                        max="90"
                                    ></mdui-slider>
                                </div>
                            </div>

                            <div class="settings-section">
                                <label for="brightnessSlider">Camera Brightness</label>
                                <mdui-slider
                                    id="brightnessSlider"
                                    value="0"
                                    min="-1"
                                    max="1"
                                    step="0.1"
                                ></mdui-slider>

                                <label for="contrastSlider">Camera Contrast</label>
                                <mdui-slider
                                    id="contrastSlider"
                                    value="1"
                                    min="0"
                                    max="8"
                                    step="0.1"
                                ></mdui-slider>

                                <label for="saturationSlider">Camera Saturation</label>
                                <mdui-slider
                                    id="saturationSlider"
                                    value="1"
                                    min="0"
                                    max="4"
                                    step="0.1"
                                ></mdui-slider>
                            </div>

                            <mdui-divider></mdui-divider>

                            <div class="settings-section">
                                <mdui-button
                                    class="settings-action-button"
                                    variant="filled"
                                    onclick="power('restart')"
                                    style="width: 100%;"
                                >
                                    Restart SIBS
                                </mdui-button>
                            </div>

                            <div class="settings-section settings-credits">
                                <p style="font-size: 0.875rem; line-height: 1.4;">
                                    Nigel Keely Et al.<br />
                                    Zentec Computing Solutions Ltd
                                </p>
                                <img
                                    id="sibs-logo"
                                    src="{{ url_for('static', filename='img/mdel-horizontal.png') }}"
                                    alt="SIBS Logo"
                                    style="width: 100%; height: auto; margin-top: 8px;"
                                />
                                <p id="version-number"></p>
                            </div>
                        </mdui-card>
                    </mdui-dropdown>
                </div>
                <div class="reload-launcher">
                    <mdui-button-icon
                        variant="filled-tonal"
                        icon="refresh"
                        title="Reload Page"
                        aria-label="Reload Page"
                        onclick="reload()"
                    ></mdui-button-icon>
                </div>
                <img id="video_feed" src="/video_feed" />
            </mdui-card>

            <mdui-card variant="filled" class="control-panel">
                <!--<div class="vertical button-card">
                    <mdui-button
                        class="button"
                        title="Reloads the webpage"
                        onclick="reload()"
                        >Reload Page</mdui-button
                    >
                    <mdui-button
                        class="button"
                        title="Restarts the device"
                        onclick="power('restart')"
                        >Restart SIBS</mdui-button
                    >
                    <p>
                        Nigel Keely Et al.<br />
                        Zentec Computing Solutions Ltd<br />
                    </p>
                    <img
                        src="{{ url_for('static', filename='img/mdel-horizontal.png') }}"
                        alt="SIBS Logo"
                    />
                </div>-->

                <mdui-card variant="elevated" class="sample-controls">
                    <div class="vertical">
                        <mdui-button
                            id="sample-button1"
                            class="sample-button"
                            onclick="confirmSampleButton(1)"
                            disabled
                            >1</mdui-button
                        >
                        <mdui-button-icon
                            variant="tonal"
                            icon="lock"
                            id="sample-button1-enable"
                            class="sample-button-enable"
                            onclick="toggleSampleButton(1)"
                        >
                        </mdui-button-icon>
                        
                    </div>
                    <div class="vertical">
                        <mdui-button
                            id="sample-button2"
                            class="sample-button"
                            onclick="confirmSampleButton(2)"
                            disabled
                            >2</mdui-button
                        >
                        <mdui-button-icon
                            variant="tonal"
                            icon="lock"
                            id="sample-button2-enable"
                            class="sample-button-enable"
                            onclick="toggleSampleButton(2)"
                        >
                        </mdui-button-icon>
                        
                    </div>
                    <div class="vertical">
                        <mdui-button
                            id="sample-button3"
                            class="sample-button"
                            onclick="confirmSampleButton(3)"
                            disabled
                            >3</mdui-button
                        >
                        <mdui-button-icon
                            variant="tonal"
                            icon="lock"
                            id="sample-button3-enable"
                            class="sample-button-enable"
                            onclick="toggleSampleButton(3)"
                        >
                        </mdui-button-icon>
                        
                    </div>
                </mdui-card>
            </mdui-card>
        </div>
        <script src="{{ url_for('static',filename='js/index.js') }}"></script>

        <!-- Register Service Worker -->
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", function () {
                    navigator.serviceWorker
                        .register(
                            "{{ url_for('static', filename='js/service-worker.js') }}",
                        )
                        .then(function (registration) {
                            console.log(
                                "ServiceWorker registration successful",
                            );
                        })
                        .catch(function (err) {
                            console.log(
                                "ServiceWorker registration failed: ",
                                err,
                            );
                        });
                });
            }
        </script>
    </body>
</html>
