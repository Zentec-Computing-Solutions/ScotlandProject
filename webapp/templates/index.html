<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>Kinacam | Control Panel</title>
        <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
        <link
            rel="stylesheet"
            href="{{ url_for('static',filename='css/styles.css') }}"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static',filename='css/fonts.css') }}"
        />
        <link
            rel="shortcut icon"
            href="{{ url_for('static', filename='img/favicon.ico') }}"
        />
    </head>

    <body>
        <header>
            <nav>
                <h1 class="play-bold">Kinacam | Control Panel</h1>
            </nav>
        </header>
        <main>
            <div class="main-container">
                <div class="video-container">
                    <img
                        id="video_feed"
                        src="/video_feed"
                        width="1280"
                        height="720"
                    />
                </div>
                <div class="controls">
                    <div class="controls-container">
                        <div class="controls-labels">
                            <label for="brightnessSlider">Brightness: </label>
                            <label for="contrastSlider">Contrast: </label>
                            <label for="saturationSlider">Saturation: </label>
                            <label for="sharpnessSlider">Sharpness: </label>
                            <label for="led">LED enabled: </label>
                            <label for="camera_enabled">Camera enabled: </label>
                        </div>
                        <div class="input-containers">
                            <div class="brightness-container input-container">
                                <input
                                    id="brightnessInput"
                                    class="number-input"
                                    type="number"
                                    value="0"
                                    min="-1"
                                    max="1"
                                    title="Brightness"
                                />
                                <input
                                    id="brightnessSlider"
                                    class="slider"
                                    type="range"
                                    min="-1"
                                    max="1"
                                    step="0.05"
                                    value="0"
                                    title="Brightness"
                                />
                            </div>
                            <div class="contrast-container input-container">
                                <input
                                    id="contrastInput"
                                    class="number-input"
                                    type="number"
                                    value="1"
                                    min="0"
                                    max="32"
                                    title="Contrast"
                                />
                                <input
                                    id="contrastSlider"
                                    class="slider"
                                    type="range"
                                    min="0"
                                    max="32"
                                    step="0.05"
                                    value="1"
                                    title="Contrast"
                                />
                            </div>
                            <div class="saturation-container input-container">
                                <input
                                    id="saturationInput"
                                    class="number-input"
                                    type="number"
                                    value="1"
                                    min="0"
                                    max="32"
                                    title="Saturation"
                                />
                                <input
                                    id="saturationSlider"
                                    class="slider"
                                    type="range"
                                    min="0"
                                    max="32"
                                    step="0.05"
                                    value="1"
                                    title="Saturation"
                                />
                            </div>

                            <div class="sharpness-container input-container">
                                <input
                                    id="sharpnessInput"
                                    class="number-input"
                                    type="number"
                                    value="1"
                                    min="0"
                                    max="16"
                                    title="Sharpness"
                                />
                                <input
                                    id="sharpnessSlider"
                                    class="slider"
                                    type="range"
                                    min="0"
                                    max="16"
                                    step="0.5"
                                    value="1"
                                    title="Sharpness"
                                />
                            </div>
                            <div class="led-container input-container">
                                <div class="checkbox-wrapper">
                                    <input
                                        id="led"
                                        type="checkbox"
                                        class="custom-checkbox"
                                        value="off"
                                        checked
                                        onclick="led(this)"
                                        title="Toggles the LED"
                                    />
                                </div>
                            </div>
                            <div class="camera-container input-container">
                                <div class="checkbox-wrapper">
                                    <input
                                        id="camera_enabled"
                                        class="custom-checkbox"
                                        type="checkbox"
                                        value="on"
                                        checked
                                        onclick="cameraEnabled(this)"
                                        title="Toggles the camera feed to the browser"
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                    <input
                        class="button"
                        type="button"
                        value="Rotate"
                        onclick="rotateVideo()"
                        title="Rotates the camera view"
                    />

                    <input
                        class="button"
                        type="button"
                        value="Reload Camera"
                        onclick="reload()"
                        title="Reloads the webpage, resetting the settings to default"
                    />
                    <input
                        class="button"
                        type="button"
                        value="Restart Pi"
                        onclick="power('restart')"
                        title="Restarts the Raspberry Pi"
                    />
                    <input
                        class="button"
                        type="button"
                        value="Shutdown Pi"
                        onclick="power('shutdown')"
                        title="Shuts down the Raspberry Pi"
                    />
                    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
                </div>
            </div>
        </main>
    </body>
</html>
